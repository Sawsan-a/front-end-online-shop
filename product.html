<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="header">
    <button class="menu-btn">☰</button>

    <a href="index.html" class="logo logo-link">
  Trendy Clothes
</a>

    <div class="header-icons">
      <button>⌕</button>
      <button>♡</button>
      <a href="cart.html" class="cart-link">🛍</a>
    </div>
  </header>

  <nav class="side-menu">
    <button class="close-menu">×</button>

    <a href="index.html">Home</a>
    <a href="#">All Dresses</a>
    <a href="#">Best Selling</a>
    <a href="#">Maxi Dress</a>
    <a href="#">Midi Dress</a>
    <a href="#">Mini Dress</a>
    <a href="#">Sale</a>
  </nav>

  <section class="product-page">

    <div class="product-image">
      <img id="productImage" src="" alt="Dress">
    </div>

    <div class="product-details">
      <h2 id="productName"></h2>

      <p class="price" id="productPrice"></p>

      <p class="description">
        Elegant modern dress with premium fabric and luxury fit.
      </p>

      <div class="sizes">
        <button class="size-btn">S</button>
        <button class="size-btn">M</button>
        <button class="size-btn">L</button>
      </div>

      <button class="add-to-cart" id="addToCart">
        Add to Cart
      </button>
    </div>

  </section>

  <div class="overlay"></div>

  <script src="js/main.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
